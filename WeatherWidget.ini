[Rainmeter]
Author=PerfLite
Update=1800

[Metadata]
Name=Weather Widget
Description=Погода с wttr.in
Version=4.0

[Variables]
City=Moscow

[measureWeather]
Measure=WebParser
Url=https://wttr.in/#City#?format=j1
Decode=1

[measureTemp]
Measure=WebParser
Url=https://wttr.in/#City#?format=j1
RegExp="temp_C":\s*"(-?\d+)

[measureFeels]
Measure=WebParser
Url=https://wttr.in/#City#?format=j1
RegExp="FeelsLikeC":\s*"(-?\d+)

[measureDesc]
Measure=WebParser
Url=https://wttr.in/#City#?format=j1
RegExp="value":\s*"([^"]+)

[measureHumidity]
Measure=WebParser
Url=https://wttr.in/#City#?format=j1
RegExp="humidity":\s*"(\d+)

[measureWind]
Measure=WebParser
Url=https://wttr.in/#City#?format=j1
RegExp="windspeedKmph":\s*"(\d+)

[measureCity]
Measure=WebParser
Url=https://wttr.in/#City#?format=j1
RegExp="areaName":\s*\[\s*\{\s*"value":\s*"([^"]+)

[styleText]
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,220
AntiAlias=1

[styleTemp]
FontFace=Segoe UI
FontSize=22
FontColor=255,255,255,255
FontWeight=700
AntiAlias=1

[styleIcon]
FontSize=18

[meterBackground]
Meter=IMAGE
SolidColor=0,0,0,160
X=0
Y=0
W=120
H=90

[meterIcon]
Meter=STRING
Text=🌤️
X=5
Y=5
Style=styleIcon

[meterTemp]
Meter=STRING
MeasureName=measureTemp
X=30
Y=5
Style=styleTemp
StringFormat=%1°C

[meterCity]
Meter=STRING
MeasureName=measureCity
X=5
Y=35
Style=styleText
ClipStringW=110

[meterFeels]
Meter=STRING
MeasureName=measureFeels
X=5
Y=50
Style=styleText
StringFormat=Ощущается %1°C

[meterHumidity]
Meter=STRING
MeasureName=measureHumidity
X=65
Y=50
Style=styleText
StringFormat=%1%

[meterWind]
Meter=STRING
MeasureName=measureWind
X=5
Y=68
Style=styleText
StringFormat=💨 %1 км/ч