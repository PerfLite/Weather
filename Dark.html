<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Deep Night & Twinkling Stars</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000205;
        }
        canvas { display: block; }
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="vignette"></div>
<canvas id="canvas"></canvas>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [], stars = [];
    const PARTICLE_COUNT = 100, STAR_COUNT = 200, CONNECTION_DIST = 160;
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    class Star {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 1.2;
            this.flickerSpeed = 0.01 + Math.random() * 0.03;
            this.phase = Math.random() * Math.PI * 2;
        }
        update() {
            this.phase += this.flickerSpeed;
            this.currentOpacity = 0.2 + (Math.abs(Math.sin(this.phase)) * 0.6);
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.currentOpacity})`;
            ctx.fill();
        }
    }
    class Particle {
        constructor() {
            this.init();
        }
        init() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.z = Math.random() * 1 + 0.5;
            this.vx = (Math.random() - 0.5) * 0.2;
            this.vy = (Math.random() - 0.5) * 0.2;
            this.phase = Math.random() * Math.PI * 2;
            this.phaseStep = 0.005 + Math.random() * 0.01;
            this.radius = (Math.random() * 1.5 + 1) * this.z;
            const hues = [190, 210, 250];
            this.h = hues[Math.floor(Math.random() * hues.length)];
            this.opacity = (Math.random() * 0.4 + 0.2) / this.z;
        }
        update() {
            this.phase += this.phaseStep;
            const driftX = Math.sin(this.phase) * 0.3;
            const driftY = Math.cos(this.phase) * 0.3;
            this.x += this.vx + driftX;
            this.y += this.vy + driftY;
            if (this.x < -50) this.x = width + 50;
            if (this.x > width + 50) this.x = -50;
            if (this.y < -50) this.y = height + 50;
            if (this.y > height + 50) this.y = -50;
        }
        draw() {
            ctx.shadowBlur = 12 * this.z;
            ctx.shadowColor = `hsla(${this.h}, 80%, 60%, 0.4)`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.h}, 80%, 70%, ${this.opacity})`;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
    function setup() {
        resize();
        particles = [];
        stars = [];
        for (let i = 0; i < STAR_COUNT; i++) stars.push(new Star());
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
    }
    function drawLines() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const p1 = particles[i], p2 = particles[j];
                const dx = p1.x - p2.x, dy = p1.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONNECTION_DIST) {
                    const alpha = (1 - dist / CONNECTION_DIST) * 0.15 * (p1.z * p2.z / 2);
                    ctx.beginPath();
                    ctx.lineWidth = 0.6 * p1.z;
                    ctx.strokeStyle = `hsla(${p1.h}, 80%, 60%, ${alpha})`;
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        }
    }
    function animate() {
        ctx.clearRect(0, 0, width, height);
        stars.forEach(s => { s.update(); s.draw(); });
        drawLines();
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', setup);
    setup();
    animate();
</script>
</body>
</html>
